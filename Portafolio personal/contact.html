        <section id="form-seccion">
            <h2>Contacto directo</h2>

            <form action="#" method="post">

                <div class="form-grid">
                    <div class="field">
                        <label for="nombre">Nombre:</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Nombre completo" required>
                    </div>

                    <div class="field">
                        <label for="email">Correo electrónico:</label>
                        <input type="email" name="email" id="email" placeholder="Correo" requiredpattern="^[^@\s]+@[^@\s]+\.[^@\s]+$">
                    </div>

                    <div class="field">
                        <label for="telefono">Teléfono:</label>
                        <input type="tel" name="telefono" id="telefono" placeholder="Teléfono (10 digitos)" required pattern="[0-9]{10}">
                    </div>

                    <div class="field">
                        <label for="mensaje">Mensaje:</label>
                        <input type="text" id="mensaje" name="mensaje" placeholder="Texto" required>
                    </div>

                    
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar</button>
                    <button type="reset" class="btn-reset">Limpiar</button>
                </div>
            </form>
        </section>
